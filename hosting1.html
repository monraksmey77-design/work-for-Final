<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Manager</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #eef2f7;
  padding: 30px;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

label {
  font-weight: bold;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add-btn {
  background: #007bff;
  color: white;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

th {
  background: #f1f1f1;
}

img {
  width: 50px;
  height: 60px;
  object-fit: cover;
}

.edit {
  background: #28a745;
  color: white;
}

.delete {
  background: #dc3545;
  color: white;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #28a745;
  color: white;
  padding: 15px 20px;
  border-radius: 5px;
  display: none;
}

/* Responsive */
@media(max-width: 768px) {
  .layout {
    grid-template-columns: 1fr;
  }
}
.pos-link-container {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 15px;
}

.pos-btn {
  background: #28a745; 
  color: white;
  padding: 10px 20px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.3s;
  box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2);
}

.pos-btn:hover {
  background: #218838;
  transform: translateY(-2px);
}
.add-btn {
  transition: background 0.3s ease, transform 0.2s;
}

</style>

</head>

<body>

<div class="container">
  <h1>Product Manager</h1>

  <div class="layout">
    <!-- Form -->
    <form id="form">
      <label>Product Name</label>
      <input type="text" id="name" required>

```
  <label>Price</label>
  <input type="number" id="price" required>

  <label>Image URL</label>
  <input type="text" id="image" required>

  <button type="submit" class="add-btn" id="submit-btn">Add Product</button>
</form>

<!-- Table -->
<div class="right-panel">
  
  <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
    <a href="hos2.html" style="background: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
      🛒 Go to POS
    </a>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

<!-- Toast -->

<div id="toast" class="toast">Product added!</div>

<script>


let products = JSON.parse(localStorage.getItem("products")) || [];
let editId = null;

const form = document.getElementById("form");
const list = document.getElementById("list");



form.addEventListener("submit", (e) => {
  e.preventDefault();
  

  const name = document.getElementById("name").value;
  const price = parseFloat(document.getElementById("price").value);
  const image = document.getElementById("image").value;

  if (editId === null) {
    products.push({
      id: Date.now(),
      name,
      price,
      image
    });
    showToast("Product added!");
  } else {
    const p = products.find(x => x.id === editId);
    p.name = name;
    p.price = price;
    p.image = image;

    editId = null;
    showToast("Product updated!");
  }

  save();
  form.reset();
  render();
});

function render() {
  list.innerHTML = "";
  products.forEach(p => {
    list.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td><img src="${p.image}" onerror="this.src='https://via.placeholder.com/50'"></td>
        <td>${p.name}</td>
        <td>$${p.price}</td>
        <td>
          <button class="edit" onclick="edit(${p.id})">Edit</button>
          <button class="delete" onclick="del(${p.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function del(id) {
  if (confirm("Delete this product?")) {
    products = products.filter(p => p.id !== id);
    save();
    render();
    showToast("Deleted!");
  }
}

function edit(id) {
  const p = products.find(x => x.id === id);
  document.getElementById("name").value = p.name;
  document.getElementById("price").value = p.price;
  document.getElementById("image").value = p.image;

  editId = id; 
  const btn = document.querySelector(".add-btn");
  btn.textContent = "Update Product"; 
  btn.style.background = "#28a745"; 
}

function save() {
  localStorage.setItem("products", JSON.stringify(products));
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}

render();
</script>

</body>

  saveToLocalStorage();
    form.reset();
    renderProducts();
    showSuccessModal();
</script>
</html>
